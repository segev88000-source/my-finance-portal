<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנתח נתונים פיננסיים - Yahoo Finance</title>
    <!-- ייבוא Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ייבוא פונט נקי מגוגל -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white shadow-2xl rounded-2xl overflow-hidden border border-slate-200">
        <!-- כותרת עליונה -->
        <div class="bg-slate-900 p-8 text-white">
            <h1 class="text-2xl font-bold mb-2">מחולל דוחות Google Sheets</h1>
            <p class="text-slate-400 text-sm">משוך נתוני היסטוריית מניות ישירות מ-Yahoo Finance לגיליון חדש</p>
        </div>

        <!-- טופס -->
        <form id="financeForm" class="p-8 space-y-6">
            
            <!-- הזנת טיקרים -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="tickers" name="tickers" placeholder="למשל: AAPL, TSLA, MSFT" required
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition">
            </div>

            <!-- תאריכים -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">תאריך התחלה</label>
                    <input type="date" id="startDate" name="startDate" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">תאריך סיום</label>
                    <input type="date" id="endDate" name="endDate" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none">
                </div>
            </div>

            <!-- תדירות -->
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">תדירות נתונים</label>
                <select id="frequency" name="frequency" 
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-white focus:ring-2 focus:ring-blue-600 outline-none appearance-none">
                    <option value="1d">יומי (Daily)</option>
                    <option value="1wk">שבועי (Weekly)</option>
                    <option value="1mo">חודשי (Monthly)</option>
                </select>
            </div>

            <!-- כפתור שליחה -->
            <button type="submit" id="submitBtn" 
                class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform hover:-translate-y-1 active:scale-95 flex items-center justify-center">
                <span id="btnText">הפק דוח ב-Google Sheets</span>
                <!-- ספינר טעינה (נסתר כברירת מחדל) -->
                <svg id="loader" class="hidden animate-spin ml-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <!-- אזור הצלחה (נסתר) -->
        <div id="successArea" class="hidden p-8 border-t border-slate-100 bg-slate-50 text-center animate-fade-in">
            <div class="mb-4 text-green-600 font-semibold flex items-center justify-center">
                <svg class="w-6 h-6 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                הדוח מוכן בהצלחה!
            </div>
            <a id="sheetLink" href="#" target="_blank" 
                class="inline-block w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition shadow-md">
                פתח את הגיליון החדש
            </a>
        </div>
    </div>

    <script>
        // החלף כאן לכתובת ה-Web App שקיבלת מ-Google Apps Script
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxWHPOhjp-kXlDxd-9iMy45qG1jRTC87gtcvK3wm9CsQZrRqOFXToXQ6CZjEvIl4rcP/exec';

        const form = document.getElementById('financeForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const successArea = document.getElementById('successArea');
        const sheetLink = document.getElementById('sheetLink');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // הכנת נתונים
            const tickersInput = document.getElementById('tickers').value;
            const payload = {
                tickers: tickersInput.split(',').map(s => s.trim().toUpperCase()),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // מצב טעינה
            setLoading(true);
            successArea.classList.add('hidden');

            try {
                // שליחת בקשה לשרת
                // הערה: משתמשים ב-'text/plain' כדי להימנע מבעיות CORS Preflight מול GAS
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // אם אתה נתקל בבעיות CORS קשות, שנה ל-'cors' ובדוק את הגדרות השרת
                    body: JSON.stringify(payload),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    }
                });

                /* 
                   בגלל מגבלות CORS ב-Google Apps Script, לעיתים לא נוכל לקרוא את ה-JSON 
                   אם הבקשה היא no-cors. הדרך הטובה ביותר היא לוודא שהשרת מחזיר JSON 
                   ולהשתמש ב-mode: 'cors' במידת האפשר.
                */
                
                // כאן אנחנו מניחים שהשרת מגיב ב-cors מלא. אם ה-Fetch עבר:
                const resultResponse = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await resultResponse.json();

                if (result.sheetUrl) {
                    sheetLink.href = result.sheetUrl;
                    successArea.classList.remove('hidden');
                    form.reset();
                } else {
                    alert('שגיאה: ' + (result.error || 'לא התקבל קישור מהשרת'));
                }

            } catch (error) {
                console.error('Error:', error);
                alert('קרתה שגיאה בחיבור לשרת. בדוק את כתובת ה-URL והרשאות הגישה.');
            } finally {
                setLoading(false);
            }
        });

        /**
         * ניהול מצב כפתור השליחה
         */
        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.innerText = 'טוען נתונים...';
                loader.classList.remove('hidden');
                submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            } else {
                submitBtn.disabled = false;
                btnText.innerText = 'הפק דוח ב-Google Sheets';
                loader.classList.add('hidden');
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
